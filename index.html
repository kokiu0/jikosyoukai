<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>sss | Dark Profile</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  color: white;
}

/* 背景アニメーション */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #0ff 0%, transparent 40%),
              radial-gradient(circle, #f0f 0%, transparent 40%),
              radial-gradient(circle, #00f 0%, transparent 40%);
  background-position: 20% 30%, 80% 70%, 50% 50%;
  background-repeat: no-repeat;
  animation: moveBg 10s linear infinite;
  opacity: 0.15;
}

@keyframes moveBg {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.card {
  position: relative;
  background: rgba(20,20,20,0.9);
  padding: 50px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  box-shadow: 0 0 30px #0ff;
  animation: fadeIn 1.5s ease forwards;
  opacity: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

h1 {
  font-size: 3em;
  margin: 0;
  letter-spacing: 5px;
  color: #0ff;
  text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
  animation: glitch 2s infinite;
}

/* グリッチ風 */
@keyframes glitch {
  0% { text-shadow: 2px 2px #f0f, -2px -2px #0ff; }
  25% { text-shadow: -2px 2px #f0f, 2px -2px #0ff; }
  50% { text-shadow: 2px -2px #f0f, -2px 2px #0ff; }
  75% { text-shadow: -2px -2px #f0f, 2px 2px #0ff; }
  100% { text-shadow: 2px 2px #f0f, -2px -2px #0ff; }
}

p {
  margin-top: 20px;
  opacity: 0.7;
  font-size: 1.1em;
}

.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 12px 30px;
  border-radius: 50px;
  border: 2px solid #0ff;
  color: #0ff;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 0 10px #0ff;
}

.btn:hover {
  background: #0ff;
  color: black;
  box-shadow: 0 0 30px #0ff;
  transform: scale(1.1);
}
</style>

</head>
<body>

<div class="card">
  <h1>sss</h1>
  <p>Enter the dark side.</p>
  <p>Neon. Shadow. Power.</p>
  <a href="#" class="btn">ACCESS</a>
</div>

</body>
</html>
